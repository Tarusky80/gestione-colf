<div class="modal fade" id="importModal{{ modal_suffix|default:tipo|capfirst }}" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="background:#17181C;border:1px solid #27282D;">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title" style="font-size:15px;font-weight:700;color:#EDEDED;"><i class="bi bi-upload me-2" style="color:#5E6AD2;"></i>Importa {{ tipo }}</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" style="color:#8A8F98;font-size:13px;">
        <p class="mb-3">Seleziona un file XLSX con intestazioni in italiano. Le righe con Codice Fiscale già esistente verranno aggiornate.</p>
        <input type="file" id="fileXlsx{{ modal_suffix|default:tipo|capfirst }}" accept=".xlsx" class="form-control" class="bg-input">
        <div id="importMsg{{ modal_suffix|default:tipo|capfirst }}" class="mt-3 small" style="display:none;"></div>
      </div>
      <div class="modal-footer border-0 pt-0">
        <button type="button" class="btn btn-sm" style="background:transparent;border:1px solid #333;color:#8A8F98;border-radius:8px;padding:6px 16px;font-size:12px;" data-bs-dismiss="modal">Annulla</button>
        <button type="button" class="btn btn-sm" onclick="importaXlsx('{{ tipo }}', '{{ modal_suffix|default:tipo|capfirst }}')" style="background:#5E6AD2;border:none;color:white;border-radius:8px;padding:6px 16px;font-size:12px;font-weight:600;"><i class="bi bi-upload me-1"></i> Importa</button>
      </div>
    </div>
  </div>
</div>
<script>
function importaXlsx(tipo, suffix) {
    var input = document.getElementById('fileXlsx' + suffix);
    var msg = document.getElementById('importMsg' + suffix);
    var file = input ? input.files[0] : null;
    if (!file) { msg.style.display = 'block'; msg.className = 'mt-3 small text-danger'; msg.textContent = 'Seleziona un file XLSX.'; return; }
    var fd = new FormData();
    fd.append('file', file);
    msg.style.display = 'block'; msg.className = 'mt-3 small text-info'; msg.textContent = 'Importazione in corso...';
    fetch('/ajax/importa-xlsx/' + tipo + '/', { method: 'POST', body: fd, headers: { 'X-CSRFToken': getCSRFToken() } })
    .then(function(r) { return r.json(); })
    .then(function(d) {
        msg.className = 'mt-3 small ' + (d.success ? 'text-success' : 'text-danger');
        msg.textContent = d.message || (d.success ? 'Importato con successo.' : 'Errore durante l\'importazione.');
        if (d.success) { setTimeout(function() { location.reload(); }, 1500); }
    })
    .catch(function(e) {
        msg.className = 'mt-3 small text-danger';
        msg.textContent = 'Errore di rete: ' + e.message;
    });
}
</script>

<div id="bustaContainer" style="display:none;">
    <div id="bustaEsistenteWarning" role="alert" style="display:none;padding:10px 14px;margin-bottom:12px;background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);border-radius:10px;color:#ef4444;font-size:12px;font-weight:600;">
        <i class="bi bi-exclamation-triangle-fill me-2"></i> Busta paga già salvata per questo periodo. Clicca <strong>SALVA BUSTA</strong> per sovrascriverla.
    </div>
    <div id="bustaLoading" class="py-4" style="display:none;">
        <div class="skeleton-card">
            <div class="skeleton-row mb-3">
                <div class="skeleton-avatar skeleton"></div>
                <div style="flex:1;padding-top:4px;">
                    <div class="skeleton skeleton-text" style="width:40%"></div>
                    <div class="skeleton skeleton-text-sm" style="width:25%"></div>
                </div>
            </div>
            <div class="skeleton skeleton-text"></div>
            <div class="skeleton skeleton-text" style="width:85%"></div>
            <div class="skeleton skeleton-text-sm" style="width:50%"></div>
            <div class="mt-3" style="display:flex;gap:10px;">
                <div class="skeleton skeleton-text" style="width:30%"></div>
                <div class="skeleton skeleton-text" style="width:45%"></div>
            </div>
            <div class="mt-3 mb-2" style="display:flex;gap:10px;">
                <div class="skeleton skeleton-text" style="width:20%"></div>
                <div class="skeleton skeleton-text" style="width:35%"></div>
                <div class="skeleton skeleton-text" style="width:25%"></div>
            </div>
            <div class="mt-2 text-center" style="opacity:0.5;">
                <div class="skeleton skeleton-inline" style="width:120px;height:12px;border-radius:4px;"></div>
            </div>
        </div>
    </div>
    <div id="bustaContent"></div>
</div>

<div id="bustaEmpty" class="text-center py-5" style="color:#5C5F66;">
    <i class="bi {{ icona_busta|default:'bi-calculator' }} fs-1 d-block mb-3" style="color:#27282D;"></i>
    <div>{{ testo_busta_empty|default:"Seleziona un contratto per visualizzare la busta paga." }}</div>
</div>
